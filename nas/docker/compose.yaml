services:
  miloco:
    image: "${EASY_MILOCO_IMAGE:-docker.io/andywu114/easy-miloco-nas:v0.5}"
    container_name: miloco
    ports:
      - "${MILOCO_PORT:-1810}:${MILOCO_PORT:-1810}"
      - "${OPENCLAW_PORT:-18789}:${OPENCLAW_PORT:-18789}"
    restart: unless-stopped
    env_file:
      - path: .env.example
        required: true
      - path: .env
        required: false
    environment:
      MILOCO_PORT: "${MILOCO_PORT:-1810}"
      OPENCLAW_PORT: "${OPENCLAW_PORT:-18789}"
      OPENCLAW_GATEWAY_PORT: "${OPENCLAW_PORT:-18789}"
      OPENCLAW_BIND: "${OPENCLAW_BIND:-auto}"
      OPENCLAW_AUTH: "${OPENCLAW_AUTH:-none}"
      MILOCO_HOME: "/data/miloco"
      MILOCO_SERVER__HOST: "${MILOCO_SERVER__HOST:-0.0.0.0}"
      MILOCO_SERVER__PORT: "${MILOCO_PORT:-1810}"
      MILOCO_SERVER__URL: "http://127.0.0.1:${MILOCO_PORT:-1810}"
      MILOCO_AGENT__WEBHOOK_URL: "http://127.0.0.1:${OPENCLAW_PORT:-18789}/miloco/webhook"
      OMNI_MODEL: "${OMNI_MODEL:-xiaomi/mimo-v2.5}"
      OMNI_BASE_URL: "${OMNI_BASE_URL:-}"
      OMNI_API_KEY: "${OMNI_API_KEY:-}"
      MIMO_API_KEY: "${MIMO_API_KEY:-}"
      MILOCO_ACCOUNT_AUTH: "${MILOCO_ACCOUNT_AUTH:-}"
      MILOCO_INSTALL_URL: "${MILOCO_INSTALL_URL:-}"
      MILOCO_RELEASE_API: "${MILOCO_RELEASE_API:-https://api.github.com/repos/andy-JustSayWhen/easy-miloco/releases/latest}"
      MILOCO_RELEASE_ZIP_URL: "${MILOCO_RELEASE_ZIP_URL:-}"
      MILOCO_FORCE_INSTALL: "${MILOCO_FORCE_INSTALL:-0}"
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${MILOCO_PORT:-1810}/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 120s
