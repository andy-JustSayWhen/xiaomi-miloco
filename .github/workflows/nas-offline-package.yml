name: Build NAS Offline Package

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Image version tag, for example v0.5"
        required: true
        default: "v0.5"
      platform:
        description: "Docker platform"
        required: true
        default: "linux/amd64"

permissions:
  contents: read

env:
  IMAGE: docker.io/andywu114/easy-miloco-nas

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build offline package
        shell: bash
        run: |
          set -Eeuo pipefail
          version="${{ inputs.version }}"
          platform="${{ inputs.platform }}"
          arch="${platform#linux/}"
          out="easy-miloco-nas-offline-${version}-${arch}"
          mkdir -p "$out"

          docker pull --platform "$platform" "${IMAGE}:${version}"
          docker save -o "$out/easy-miloco-nas-${version}-${arch}.tar" "${IMAGE}:${version}"

          cp nas/docker/compose.ugreen-template.yaml "$out/compose.ugreen-offline.yaml"
          python3 - "$out/compose.ugreen-offline.yaml" "${IMAGE}:${version}" <<'PY'
          from pathlib import Path
          import re
          import sys

          path = Path(sys.argv[1])
          image = sys.argv[2]
          text = path.read_text(encoding="utf-8")
          text = re.sub(r"image:\s+\S+", f"image: {image}", text, count=1)
          path.write_text(text, encoding="utf-8")
          PY

          cat > "$out/README.txt" <<EOF
          easy-miloco NAS 离线包 ${version} ${arch}

          使用步骤：
          1. 绿联 Docker -> 镜像 -> 导入，选择 easy-miloco-nas-${version}-${arch}.tar。
          2. 镜像列表出现 ${IMAGE}:${version} 后，进入项目/Compose 部署。
          3. 粘贴 compose.ugreen-offline.yaml。
          4. 修改 OMNI_API_KEY、OPENCLAW_CHAT_API_KEY。
          5. 修改 volumes 里的数据路径：只替换 <> 内的路径和 <> 符号，右侧 :/data 不要改。
          6. 部署后等待 1-3 分钟，再打开 http://NAS-IP:1810/ 和 http://NAS-IP:18789/。

          不要公开分享运行后的 /data 目录或容器备份；只分享本离线镜像 tar、YAML 和说明。
          EOF

          (cd "$out" && sha256sum * > SHA256SUMS.txt)
          tar -czf "${out}.tar.gz" "$out"

      - name: Upload offline package
        uses: actions/upload-artifact@v4
        with:
          name: easy-miloco-nas-offline-${{ inputs.version }}-${{ inputs.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          path: easy-miloco-nas-offline-${{ inputs.version }}-*.tar.gz
          if-no-files-found: error
