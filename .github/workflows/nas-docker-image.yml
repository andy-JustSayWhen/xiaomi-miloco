name: Build NAS Docker Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Image version tag, for example v0.5"
        required: true
        default: "v0.5"
      payload_version:
        description: "Runtime payload version. Leave empty to use today's CalVer date."
        required: false
        default: ""
  push:
    branches: [NAS]
    paths:
      - "backend/**"
      - "cli/**"
      - "nas/docker/**"
      - "plugins/openclaw/**"
      - "scripts/**"
      - "web/**"
      - ".github/workflows/nas-docker-image.yml"

permissions:
  contents: read
  packages: write

env:
  GHCR_IMAGE: ghcr.io/andy-justsaywhen/easy-miloco-nas
  DOCKERHUB_IMAGE: docker.io/andywu114/easy-miloco-nas

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: |
            backend/uv.lock
            cli/uv.lock

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: |
            web/pnpm-lock.yaml
            plugins/openclaw/pnpm-lock.yaml

      - name: Build current branch runtime payload
        id: payload
        env:
          REQUESTED_PAYLOAD_VERSION: ${{ inputs.payload_version }}
        run: |
          set -euo pipefail
          payload_version="${REQUESTED_PAYLOAD_VERSION}"
          if [ -z "${payload_version}" ]; then
            payload_version="$(date -u '+%Y.%-m.%-d')"
          fi
          echo "payload_version=${payload_version}" >> "${GITHUB_OUTPUT}"
          bash scripts/build.sh --version "${payload_version}"
          rm -rf nas/docker/.build-payload
          mkdir -p nas/docker/.build-payload/models
          cp dist/install.sh dist/manifest.json nas/docker/.build-payload/
          cp "dist/miloco-linux-x86_64-${payload_version}.tar.gz" nas/docker/.build-payload/
          cp backend/miloco/src/miloco/perception/models/* nas/docker/.build-payload/models/
          ls -lh nas/docker/.build-payload

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve image tags
        id: image_tags
        env:
          VERSION: ${{ inputs.version || 'v0.5' }}
          HUAWEI_SWR_REGISTRY: ${{ secrets.HUAWEI_SWR_REGISTRY }}
          HUAWEI_SWR_NAMESPACE: ${{ secrets.HUAWEI_SWR_NAMESPACE }}
          HUAWEI_SWR_REPOSITORY: ${{ secrets.HUAWEI_SWR_REPOSITORY }}
          HUAWEI_SWR_USERNAME: ${{ secrets.HUAWEI_SWR_USERNAME }}
          HUAWEI_SWR_PASSWORD: ${{ secrets.HUAWEI_SWR_PASSWORD }}
        run: |
          swr_enabled=false
          swr_image=
          if [ -n "${HUAWEI_SWR_REGISTRY}" ] && [ -n "${HUAWEI_SWR_NAMESPACE}" ] && [ -n "${HUAWEI_SWR_REPOSITORY}" ] && [ -n "${HUAWEI_SWR_USERNAME}" ] && [ -n "${HUAWEI_SWR_PASSWORD}" ]; then
            swr_image="${HUAWEI_SWR_REGISTRY}/${HUAWEI_SWR_NAMESPACE}/${HUAWEI_SWR_REPOSITORY}"
            swr_enabled=true
          fi
          {
            echo "tags<<EOF"
            echo "${GHCR_IMAGE}:${VERSION}"
            echo "${GHCR_IMAGE}:latest"
            echo "${DOCKERHUB_IMAGE}:${VERSION}"
            echo "${DOCKERHUB_IMAGE}:latest"
            echo "EOF"
            echo "swr_enabled=${swr_enabled}"
            echo "swr_image=${swr_image}"
          } >> "${GITHUB_OUTPUT}"

      - uses: docker/login-action@v3
        if: steps.image_tags.outputs.swr_enabled == 'true'
        with:
          registry: ${{ secrets.HUAWEI_SWR_REGISTRY }}
          username: ${{ secrets.HUAWEI_SWR_USERNAME }}
          password: ${{ secrets.HUAWEI_SWR_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: nas/docker
          file: nas/docker/Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            MILOCO_RELEASE_ZIP_URL=https://github.com/andy-JustSayWhen/easy-miloco/releases/download/${{ inputs.version || 'v0.5' }}/easy-miloco-${{ inputs.version || 'v0.5' }}-windows.zip
          tags: ${{ steps.image_tags.outputs.tags }}
          provenance: false
          sbom: false
          labels: |
            org.opencontainers.image.source=https://github.com/andy-JustSayWhen/easy-miloco
            org.opencontainers.image.description=easy-miloco NAS Docker image

      - name: Build and push SWR
        if: steps.image_tags.outputs.swr_enabled == 'true'
        env:
          VERSION: ${{ inputs.version || 'v0.5' }}
          SWR_IMAGE: ${{ steps.image_tags.outputs.swr_image }}
        run: |
          docker build \
            --platform linux/amd64 \
            --build-arg MILOCO_RELEASE_ZIP_URL=https://github.com/andy-JustSayWhen/easy-miloco/releases/download/${VERSION}/easy-miloco-${VERSION}-windows.zip \
            --file nas/docker/Dockerfile \
            --tag "${SWR_IMAGE}:${VERSION}" \
            --tag "${SWR_IMAGE}:latest" \
            nas/docker
          docker push "${SWR_IMAGE}:${VERSION}"
          docker push "${SWR_IMAGE}:latest"
