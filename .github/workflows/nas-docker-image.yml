name: Build NAS Docker Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Image version tag, for example v0.5"
        required: true
        default: "v0.5"
  push:
    branches: [NAS]
    paths:
      - "nas/docker/**"
      - ".github/workflows/nas-docker-image.yml"

permissions:
  contents: read
  packages: write

env:
  GHCR_IMAGE: ghcr.io/andy-justsaywhen/easy-miloco-nas
  DOCKERHUB_IMAGE: docker.io/andywu114/easy-miloco-nas

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve image tags
        id: image_tags
        env:
          VERSION: ${{ inputs.version || 'v0.5' }}
          HUAWEI_SWR_REGISTRY: ${{ secrets.HUAWEI_SWR_REGISTRY }}
          HUAWEI_SWR_NAMESPACE: ${{ secrets.HUAWEI_SWR_NAMESPACE }}
          HUAWEI_SWR_REPOSITORY: ${{ secrets.HUAWEI_SWR_REPOSITORY }}
          HUAWEI_SWR_USERNAME: ${{ secrets.HUAWEI_SWR_USERNAME }}
          HUAWEI_SWR_PASSWORD: ${{ secrets.HUAWEI_SWR_PASSWORD }}
        run: |
          swr_enabled=false
          {
            echo "tags<<EOF"
            echo "${GHCR_IMAGE}:${VERSION}"
            echo "${GHCR_IMAGE}:latest"
            echo "${DOCKERHUB_IMAGE}:${VERSION}"
            echo "${DOCKERHUB_IMAGE}:latest"
            if [ -n "${HUAWEI_SWR_REGISTRY}" ] && [ -n "${HUAWEI_SWR_NAMESPACE}" ] && [ -n "${HUAWEI_SWR_REPOSITORY}" ] && [ -n "${HUAWEI_SWR_USERNAME}" ] && [ -n "${HUAWEI_SWR_PASSWORD}" ]; then
              echo "${HUAWEI_SWR_REGISTRY}/${HUAWEI_SWR_NAMESPACE}/${HUAWEI_SWR_REPOSITORY}:${VERSION}"
              echo "${HUAWEI_SWR_REGISTRY}/${HUAWEI_SWR_NAMESPACE}/${HUAWEI_SWR_REPOSITORY}:latest"
              swr_enabled=true
            fi
            echo "EOF"
            echo "swr_enabled=${swr_enabled}"
          } >> "${GITHUB_OUTPUT}"

      - uses: docker/login-action@v3
        if: steps.image_tags.outputs.swr_enabled == 'true'
        with:
          registry: ${{ secrets.HUAWEI_SWR_REGISTRY }}
          username: ${{ secrets.HUAWEI_SWR_USERNAME }}
          password: ${{ secrets.HUAWEI_SWR_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: nas/docker
          file: nas/docker/Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            MILOCO_RELEASE_ZIP_URL=https://github.com/andy-JustSayWhen/easy-miloco/releases/download/${{ inputs.version || 'v0.5' }}/easy-miloco-${{ inputs.version || 'v0.5' }}-windows.zip
          tags: ${{ steps.image_tags.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/andy-JustSayWhen/easy-miloco
            org.opencontainers.image.description=easy-miloco NAS Docker image
