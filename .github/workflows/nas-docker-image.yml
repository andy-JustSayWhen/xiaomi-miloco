name: Build NAS Docker Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Image version tag, for example v0.5"
        required: true
        default: "v0.5"
  push:
    branches: [NAS]
    paths:
      - "nas/docker/**"
      - ".github/workflows/nas-docker-image.yml"

permissions:
  contents: read
  packages: write

env:
  GHCR_IMAGE: ghcr.io/andy-justsaywhen/easy-miloco-nas
  DOCKERHUB_IMAGE: docker.io/andywu114/easy-miloco-nas

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: nas/docker
          file: nas/docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.GHCR_IMAGE }}:${{ inputs.version || 'v0.5' }}
            ${{ env.GHCR_IMAGE }}:latest
            ${{ env.DOCKERHUB_IMAGE }}:${{ inputs.version || 'v0.5' }}
            ${{ env.DOCKERHUB_IMAGE }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/andy-JustSayWhen/easy-miloco
            org.opencontainers.image.description=easy-miloco NAS Docker image
